{% extends 'base.html' %}
{% block title %}Регистрация — Audio Waves{% endblock %}
{% block content %}
<section class="form-wrap py-4">
    <form method="post" class="auth-form panel p-4 mx-auto">
        <h1 class="mb-4">Регистрация</h1>
        <input class="form-control" type="text" name="username" placeholder="Логин" required>
        <input class="form-control" type="email" name="email" placeholder="Email" required>
        <select class="form-select" name="role">
            <option value="user">Покупатель</option>
            <option value="beatmaker">Битмейкер</option>
        </select>
        <input class="form-control" type="password" name="password" placeholder="Пароль" required>
        <input class="form-control" type="password" name="confirm_password" placeholder="Повторите пароль" required>
        <button type="submit" class="btn">Создать аккаунт</button>
        <p class="mb-0">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
    </form>
</section>
{% endblock %}
